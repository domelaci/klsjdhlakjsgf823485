<!-- Kassza Dashboard v6.12.0 — 2026-03-31 — Szállás category added -->
<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kassza Dashboard 📊</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F5F2EC; --card:#FFFFFF; --ink:#1A1814; --ink2:#6B6760; --ink3:#B0ADA8;
    --accent:#C8553D; --green:#3A7D5C; --green-bg:#EBF4EE;
    --red-bg:#FAEAE7; --border:#E8E4DC; --r:18px;
    --purple:#6B4EAA; --purple-bg:#F0EBFA;
    --amber:#B07A10; --amber-bg:#FDF3DC;
    --blue:#185FA5; --blue-bg:#E6F1FB;
    --teal:#0F6E56; --teal-bg:#E1F5EE;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);min-height:100vh;}

  /* Header */
  .dash-header{padding:28px 32px 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
  .dash-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:800;}
  .dash-title span{color:var(--accent);}
  .dash-controls{display:flex;align-items:center;gap:10px;}
  .month-switch{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:12px;padding:8px 16px;border:1px solid var(--border);transition:opacity .2s;}
  .month-switch.dimmed{opacity:.4;pointer-events:none;}
  .month-btn{background:none;border:none;cursor:pointer;color:var(--ink2);font-size:20px;padding:0 2px;line-height:1;}
  .month-label{font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;min-width:90px;text-align:center;}
  .back-btn{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:8px 16px;font-size:13px;color:var(--ink2);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;text-decoration:none;display:inline-block;}
  .sync-bar{padding:8px 32px 0;font-size:13px;color:var(--ink3);display:flex;align-items:center;gap:7px;}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--ink3);flex-shrink:0;}
  .sync-dot.ok{background:var(--green);}
  .sync-dot.syncing{background:var(--amber);animation:pulse .8s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}

  /* User columns */
  .dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:20px 32px 40px;}
  @media(max-width:900px){.dash-grid{grid-template-columns:1fr;}}
  .user-col{display:flex;flex-direction:column;gap:14px;}

  /* Column header */
  .col-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;padding:4px 0;}
  .col-header-left{}
  .user-heading{font-family:'Plus Jakarta Sans',sans-serif;font-size:17px;font-weight:800;}
  .last-entry{font-size:11px;color:var(--ink3);margin-top:3px;}
  .last-entry.stale{color:var(--accent);}

  /* Per-column toggle */
  .col-toggle{display:flex;background:var(--border);border-radius:8px;padding:2px;gap:2px;flex-shrink:0;}
  .col-toggle-btn{padding:5px 10px;border:none;border-radius:6px;background:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;color:var(--ink2);cursor:pointer;transition:all .15s;white-space:nowrap;}
  .col-toggle-btn.active{background:var(--card);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.1);}

  /* Open button */
  .open-btn{width:100%;padding:11px;background:var(--card);border:1px solid var(--border);border-radius:12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;color:var(--ink2);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;}
  .open-btn:hover{border-color:var(--ink2);color:var(--ink);background:var(--bg);}

  /* Summary card */
  .sum-card{background:var(--ink);border-radius:var(--r);padding:20px;color:#fff;position:relative;overflow:hidden;}
  .sum-card::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;border-radius:50%;background:rgba(200,85,61,.15);}
  .sum-inner{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:flex-start;}
  .s-label{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px;}
  .s-big{font-family:'Plus Jakarta Sans',sans-serif;font-size:26px;font-weight:700;letter-spacing:-.5px;line-height:1.1;}
  .s-med{font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:700;color:#fff;line-height:1;}
  .s-right{display:flex;flex-direction:column;gap:8px;text-align:right;}
  .s-tag{font-size:10px;color:rgba(255,255,255,.35);margin-top:6px;position:relative;z-index:1;}
  .bar-wrap{margin-top:14px;position:relative;z-index:1;}
  .bar-track{height:3px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden;}
  .bar-fill{height:100%;background:#E8B84B;border-radius:2px;transition:width .5s ease;}
  .bar-labels{display:flex;justify-content:space-between;margin-top:5px;font-size:11px;color:rgba(255,255,255,.4);}

  /* Balance tiles */
  .bal-tiles{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .bal-tile{background:var(--card);border-radius:12px;padding:12px 14px;border:1px solid var(--border);}
  .bal-tile.bank   {border-left:3px solid var(--blue);  background:var(--blue-bg);}
  .bal-tile.cash   {border-left:3px solid var(--amber); background:var(--amber-bg);}
  .bal-tile.savings{border-left:3px solid var(--purple);background:var(--purple-bg);}
  .bal-tile.loans  {border-left:3px solid var(--teal);  background:var(--teal-bg);}
  .bal-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink2);margin-bottom:4px;}
  .bal-amt{font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:700;color:var(--ink);}

  /* Category bars */
  .chart-card{background:var(--card);border-radius:var(--r);padding:16px;border:1px solid var(--border);}
  .chart-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;font-weight:700;color:var(--ink2);letter-spacing:.1em;margin-bottom:12px;text-transform:uppercase;}
  .cat-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .cat-bar-icon{font-size:14px;width:20px;text-align:center;flex-shrink:0;}
  .cat-bar-body{flex:1;}
  .cat-bar-top{display:flex;justify-content:space-between;margin-bottom:3px;}
  .cat-bar-name{font-size:12px;font-weight:500;}
  .cat-bar-amt{font-size:12px;font-weight:700;}
  .cat-bar-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
  .cat-bar-fill{height:100%;border-radius:3px;}
  .empty-chart{text-align:center;padding:16px 0;color:var(--ink3);font-size:13px;}

  /* Login overlay */
  .login-overlay{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;}
  .login-overlay.hidden{display:none;}
  .lo-logo{font-family:'Plus Jakarta Sans',sans-serif;font-size:42px;font-weight:800;margin-bottom:6px;}
  .lo-logo span{color:var(--accent);}
  .lo-line{width:36px;height:3px;background:var(--accent);border-radius:2px;margin:16px auto 24px;}
  .lo-msg{font-size:14px;color:var(--ink2);margin-bottom:28px;}
  .lo-btn{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 22px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:500;color:var(--ink);cursor:pointer;display:flex;align-items:center;gap:10px;}
  .lo-btn svg{width:18px;height:18px;}
  .lo-err{font-size:13px;color:var(--accent);margin-top:12px;display:none;}

  /* Loading */
  .loading{text-align:center;padding:40px;color:var(--ink3);font-size:14px;}
</style>
</head>
<body>

<!-- Login overlay -->
<div class="login-overlay" id="loginOverlay">
  <div class="lo-logo">kass<span>za</span> 📊</div>
  <div class="lo-line"></div>
  <div class="lo-msg">Dashboard — csak Döme számára</div>
  <button class="lo-btn" onclick="signIn()">
    <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Bejelentkezés Google fiókkal
  </button>
  <div class="lo-err" id="loErr">Csak Döme férhet hozzá a dashboardhoz.</div>
</div>

<!-- Dashboard -->
<div id="dashApp" style="display:none;">
  <div class="dash-header">
    <div class="dash-title">kass<span>za</span> 📊 Dashboard</div>
    <div class="dash-controls">
      <div class="month-switch" id="monthSwitch">
        <button class="month-btn" onclick="changeMonth(-1)">‹</button>
        <div class="month-label" id="monthLabel">—</div>
        <button class="month-btn" onclick="changeMonth(1)">›</button>
      </div>
      <a class="back-btn" href="index.html">← Vissza</a>
    </div>
  </div>
  <div class="sync-bar">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncLabel">Betöltés…</span>
  </div>
  <div class="dash-grid" id="dashGrid">
    <div class="loading">Adatok betöltése…</div>
  </div>
</div>

<script>
const SCRIPT_URL   = 'https://script.google.com/macros/s/AKfycby70E-kDy0QQT_3KfQRxNA5wM8b2k8n0lkR3Ux-37k6BI1Rmk4P6HYqLBby6iCS8D-sTQ/exec';
const DASH_USERS   = ['Döme', 'Emma', 'Éva'];
const MONTHS_SHORT = ['Jan','Feb','Már','Ápr','Máj','Jún','Júl','Aug','Sze','Okt','Nov','Dec'];
const CATS = [
  {id:'kaja',label:'Kaja',icon:'🍔'},{id:'ruha',label:'Ruha',icon:'👗'},
  {id:'utazas',label:'Utazás',icon:'🚌'},{id:'szallas',label:'Szállás',icon:'🏨'},
  {id:'konyv',label:'Könyv',icon:'📚'},{id:'fancy',label:'Fancy',icon:'✨'},
  {id:'egyeb',label:'Egyéb',icon:'🛍️'},
];
const CAT_COLOURS = {kaja:'#C8553D',ruha:'#3A7D5C',utazas:'#185FA5',szallas:'#2E7D9A',konyv:'#B07A10',fancy:'#6B4EAA',egyeb:'#6B6760'};

let curY = new Date().getFullYear();
let curM = new Date().getMonth();
let allData = {}; // {userName: [entries]}

// Per-column toggle state: 'havi' | 'osszes'
const colMode = {Döme:'havi', Emma:'havi', Éva:'havi'};

// ── Auth ─────────────────────────────────────────────────────
function signIn() {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: '53917763443-3hjc5rge271njo0ojtrj5j3cohic4v4r.apps.googleusercontent.com',
    scope: 'email profile',
    callback: async (resp) => {
      if (resp.error) return;
      const res  = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {headers:{Authorization:'Bearer '+resp.access_token}});
      const info = await res.json();
      if (info.email === 'domelaci@gmail.com') {
        sessionStorage.setItem('dash_auth', '1');
        sessionStorage.setItem('kz_auth_name',  'Döme');
        sessionStorage.setItem('kz_auth_email', 'domelaci@gmail.com');
        document.getElementById('loginOverlay').classList.add('hidden');
        document.getElementById('dashApp').style.display = 'block';
        loadAll();
      } else {
        document.getElementById('loErr').style.display = 'block';
      }
    }
  });
  client.requestAccessToken();
}

// Check session
if (sessionStorage.getItem('dash_auth') === '1' || sessionStorage.getItem('kz_auth_email') === 'domelaci@gmail.com') {
  sessionStorage.setItem('dash_auth', '1');
  document.getElementById('loginOverlay').classList.add('hidden');
  document.getElementById('dashApp').style.display = 'block';
}

// ── Month nav ─────────────────────────────────────────────────
function changeMonth(d) {
  curM += d;
  if (curM > 11){curM=0;curY++;}
  if (curM < 0) {curM=11;curY--;}
  document.getElementById('monthLabel').textContent = MONTHS_SHORT[curM]+' '+curY;
  updateMonthNavDimmed();
  renderDash();
}

function updateMonthNavDimmed() {
  // Dim month nav if ALL columns are in 'osszes' mode
  const allOsszes = DASH_USERS.every(u => colMode[u] === 'osszes');
  document.getElementById('monthSwitch').classList.toggle('dimmed', allOsszes);
}

// ── Toggle per column ─────────────────────────────────────────
function setColMode(user, mode) {
  colMode[user] = mode;
  updateMonthNavDimmed();
  renderDash();
}

// ── Open as user ──────────────────────────────────────────────
function openAsUser(user) {
  // Stay as Döme (authenticated), but signal kasszako.html to launch as this user
  sessionStorage.setItem('kz_launch_as', user);
  sessionStorage.setItem('kz_from_dashboard', '1');
  window.location.href = 'index.html';
}

// ── Load all users ────────────────────────────────────────────
async function loadAll() {
  document.getElementById('monthLabel').textContent = MONTHS_SHORT[curM]+' '+curY;
  document.getElementById('syncDot').className = 'sync-dot syncing';
  document.getElementById('syncLabel').textContent = 'Adatok betöltése…';

  const promises = DASH_USERS.map(async (user) => {
    try {
      const q = new URLSearchParams({action:'getEntries', user});
      const res = await fetch(SCRIPT_URL+'?'+q);
      const data = await res.json();
      allData[user] = data.entries || [];
    } catch(e) {
      allData[user] = [];
    }
  });

  await Promise.all(promises);

  document.getElementById('syncDot').className = 'sync-dot ok';
  document.getElementById('syncLabel').textContent = 'Szinkronizálva ✓';
  renderDash();
}

// ── Helpers ───────────────────────────────────────────────────
function fmtFt(n){return 'Ft '+Math.round(n||0).toLocaleString('hu-HU');}

function calcBalances(entries) {
  let bank=0,cash=0,savings=0,loans=0;
  entries.forEach(e => {
    const amt = e.amtHUF||e.origAmt||0;
    const src = e.source||'bank';
    if (e.type==='in')         { src==='bank'?bank+=amt:cash+=amt; }
    else if(e.type==='out')    { src==='bank'?bank-=amt:cash-=amt; }
    else if(e.type==='save')   { bank-=amt;savings+=amt; }
    else if(e.type==='withdraw'){savings-=amt;bank+=amt;}
    else if(e.type==='transfer'){bank-=amt;cash+=amt;}
    else if(e.type==='loan'||e.type==='advance'){src==='bank'?bank-=amt:cash-=amt;loans+=amt;}
    else if(e.type==='reimburse'){src==='bank'?bank+=amt:cash+=amt;loans-=amt;}
    else if(e.type==='correction'){const d=e.delta||0;if(e.pot==='bank')bank+=d;else if(e.pot==='cash')cash+=d;else if(e.pot==='savings')savings+=d;}
  });
  return {bank, cash, savings: Math.max(0,savings), loans};
}

function calcOutstandingLoans(entries) {
  const debtMap={};
  [...entries].reverse().forEach(e=>{
    if (!e.personName) return;
    if (e.type==='loan'||e.type==='advance') debtMap[e.personName]=(debtMap[e.personName]||0)+(e.amtHUF||e.origAmt);
    if (e.type==='reimburse') debtMap[e.personName]=(debtMap[e.personName]||0)-(e.amtHUF||e.origAmt);
  });
  return Object.values(debtMap).filter(v=>v>0).reduce((s,v)=>s+v,0);
}

function buildCatBars(spendEntries) {
  const totals={};CATS.forEach(c=>{totals[c.id]=0;});
  spendEntries.forEach(e=>{const id=e.cat||'egyeb';totals[id]=(totals[id]||0)+(e.amtHUF||e.origAmt);});
  const total=Object.values(totals).reduce((s,v)=>s+v,0);
  const sorted=CATS.map(c=>({...c,amt:totals[c.id]||0})).filter(c=>c.amt>0).sort((a,b)=>b.amt-a.amt);
  if (sorted.length === 0) return `<div class="empty-chart">Nincs kiadás</div>`;
  return sorted.map(c => {
    const p = total>0?Math.round(c.amt/total*100):0;
    return `<div class="cat-bar-row">
      <div class="cat-bar-icon">${c.icon}</div>
      <div class="cat-bar-body">
        <div class="cat-bar-top"><span class="cat-bar-name">${c.label}</span><span class="cat-bar-amt">${fmtFt(c.amt)}</span></div>
        <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${p}%;background:${CAT_COLOURS[c.id]||'#888'}"></div></div>
      </div>
    </div>`;
  }).join('');
}

function fmtLastEntry(entries) {
  if (!entries || entries.length === 0) return {text:'Még nincs tétel', stale:false};
  // Find the most recent entry date
  const sorted = [...entries].filter(e=>e.date).sort((a,b)=>new Date(b.date)-new Date(a.date));
  if (!sorted.length) return {text:'Még nincs tétel', stale:false};
  const d = new Date(sorted[0].date);
  const now = new Date();
  const diffDays = Math.floor((now - d) / 86400000);
  let text;
  if (diffDays === 0) text = 'Utolsó tétel: ma';
  else if (diffDays === 1) text = 'Utolsó tétel: tegnap';
  else if (diffDays < 7) text = `Utolsó tétel: ${diffDays} napja`;
  else text = `Utolsó tétel: ${MONTHS_SHORT[d.getMonth()]} ${d.getDate()}.`;
  return {text, stale: diffDays > 14};
}

// ── Render dashboard ──────────────────────────────────────────
function renderDash() {
  const grid = document.getElementById('dashGrid');
  grid.innerHTML = DASH_USERS.map(user => renderUserCol(user)).join('');
}

function renderUserCol(user) {
  const entries = allData[user] || [];
  const mode    = colMode[user] || 'havi';
  const isOsszes = mode === 'osszes';

  // Last entry stamp
  const lastEntry = fmtLastEntry(entries);

  // Toggle HTML
  const toggleHTML = `<div class="col-toggle">
    <button class="col-toggle-btn ${!isOsszes?'active':''}" onclick="setColMode('${user}','havi')">Havi</button>
    <button class="col-toggle-btn ${isOsszes?'active':''}" onclick="setColMode('${user}','osszes')">Összes</button>
  </div>`;

  let sumCardHTML, catCardHTML, balTilesHTML;

  if (isOsszes) {
    // ── All-time view ──────────────────────────────────────
    const bejott = entries.filter(e=>e.type==='in'||e.type==='reimburse').reduce((s,e)=>s+(e.amtHUF||e.origAmt),0);
    const kiment = entries.filter(e=>e.type==='out'||e.type==='loan').reduce((s,e)=>s+(e.amtHUF||e.origAmt),0);
    const maradt = bejott - kiment;
    const pct    = bejott > 0 ? Math.min(100, Math.round(kiment/bejott*100)) : 0;

    sumCardHTML = `<div class="sum-card">
      <div class="sum-inner">
        <div>
          <div class="s-label">Nettó egyenleg</div>
          <div class="s-big">${fmtFt(maradt)}</div>
        </div>
        <div class="s-right">
          <div><div class="s-label">Összes bevétel</div><div class="s-med">${fmtFt(bejott)}</div></div>
          <div><div class="s-label">Összes kiadás</div><div class="s-med">${fmtFt(kiment)}</div></div>
        </div>
      </div>
      <div class="bar-wrap">
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        <div class="bar-labels"><span>${pct}% elköltve</span><span>teljes időszak</span></div>
      </div>
      <div class="s-tag">Összes tétel: ${entries.length} db</div>
    </div>`;

    const bal = calcBalances(entries);
    const outstandingTotal = calcOutstandingLoans(entries);
    balTilesHTML = `<div class="bal-tiles">
      <div class="bal-tile bank"><div class="bal-label">Bank</div><div class="bal-amt">${fmtFt(bal.bank)}</div></div>
      <div class="bal-tile cash"><div class="bal-label">Készpénz</div><div class="bal-amt">${fmtFt(bal.cash)}</div></div>
      <div class="bal-tile savings"><div class="bal-label">Megtakarítás</div><div class="bal-amt">${fmtFt(bal.savings)}</div></div>
      <div class="bal-tile loans"><div class="bal-label">Kintlévőség</div><div class="bal-amt">${fmtFt(outstandingTotal)}</div></div>
    </div>`;

    const catBars = buildCatBars(entries.filter(e=>e.type==='out'));
    catCardHTML = `<div class="chart-card">
      <div class="chart-title">Kategóriák — teljes időszak</div>
      ${catBars}
    </div>`;

  } else {
    // ── Monthly view ───────────────────────────────────────
    const month = entries.filter(e => e.month === curM && e.year === curY);
    const bejott = month.filter(e=>e.type==='in'||e.type==='reimburse').reduce((s,e)=>s+(e.amtHUF||e.origAmt),0);
    const kiment = month.filter(e=>e.type==='out'||e.type==='loan').reduce((s,e)=>s+(e.amtHUF||e.origAmt),0);
    const maradt = bejott - kiment;
    const pct    = bejott > 0 ? Math.min(100, Math.round(kiment/bejott*100)) : 0;

    sumCardHTML = `<div class="sum-card">
      <div class="sum-inner">
        <div>
          <div class="s-label">Maradt</div>
          <div class="s-big">${fmtFt(maradt)}</div>
        </div>
        <div class="s-right">
          <div><div class="s-label">Bejött</div><div class="s-med">${fmtFt(bejott)}</div></div>
          <div><div class="s-label">Kiment</div><div class="s-med">${fmtFt(kiment)}</div></div>
        </div>
      </div>
      <div class="bar-wrap">
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        <div class="bar-labels"><span>${pct}% elköltve</span><span>${fmtFt(Math.max(0,maradt))} maradt</span></div>
      </div>
    </div>`;

    const bal = calcBalances(entries);
    const outstandingTotal = calcOutstandingLoans(entries);
    balTilesHTML = `<div class="bal-tiles">
      <div class="bal-tile bank"><div class="bal-label">Bank</div><div class="bal-amt">${fmtFt(bal.bank)}</div></div>
      <div class="bal-tile cash"><div class="bal-label">Készpénz</div><div class="bal-amt">${fmtFt(bal.cash)}</div></div>
      <div class="bal-tile savings"><div class="bal-label">Megtakarítás</div><div class="bal-amt">${fmtFt(bal.savings)}</div></div>
      <div class="bal-tile loans"><div class="bal-label">Kintlévőség</div><div class="bal-amt">${fmtFt(outstandingTotal)}</div></div>
    </div>`;

    const catBars = buildCatBars(month.filter(e=>e.type==='out'));
    catCardHTML = `<div class="chart-card">
      <div class="chart-title">Kategóriák — ${MONTHS_SHORT[curM]} ${curY}</div>
      ${catBars}
    </div>`;
  }

  return `<div class="user-col">
    <div class="col-header">
      <div class="col-header-left">
        <div class="user-heading">${user}</div>
        <div class="last-entry ${lastEntry.stale?'stale':''}">${lastEntry.text}</div>
      </div>
      ${toggleHTML}
    </div>
    ${sumCardHTML}
    ${balTilesHTML}
    ${catCardHTML}
    <button class="open-btn" onclick="openAsUser('${user}')">Megnyitás ${user} nézetében →</button>
  </div>`;
}

// ── Auto-load if already authenticated ────────────────────────
if (sessionStorage.getItem('dash_auth')==='1' || sessionStorage.getItem('kz_auth_email')==='domelaci@gmail.com') loadAll();
</script>
</body>
</html>
