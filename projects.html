<!-- Kassza Projektek v6.10.2 — 2026-03-26 — Font update -->
<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kassza Projektek 🗂️</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F5F2EC; --card:#FFFFFF; --ink:#1A1814; --ink2:#6B6760; --ink3:#B0ADA8;
    --accent:#C8553D; --green:#3A7D5C; --border:#E8E4DC; --r:18px;
    --amber:#B07A10; --amber-bg:#FDF3DC; --blue:#185FA5; --blue-bg:#E6F1FB;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);min-height:100vh;}
  .header{padding:40px 24px 0;display:flex;justify-content:space-between;align-items:center;}
  .title{font-family:'Plus Jakarta Sans',sans-serif;font-size:24px;font-weight:800;}
  .title span{color:var(--accent);}
  .back-btn{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:8px 16px;font-size:13px;color:var(--ink2);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;text-decoration:none;}
  .body{padding:24px;}
  .coming-card{background:var(--card);border-radius:var(--r);border:2px dashed var(--border);padding:48px 24px;text-align:center;margin-top:16px;}
  .coming-icon{font-size:52px;margin-bottom:16px;}
  .coming-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:20px;font-weight:800;margin-bottom:8px;}
  .coming-msg{font-size:14px;color:var(--ink2);line-height:1.6;max-width:320px;margin:0 auto;}
  .feature-list{margin-top:24px;display:flex;flex-direction:column;gap:8px;text-align:left;max-width:300px;margin-left:auto;margin-right:auto;}
  .feature-item{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--ink2);background:var(--bg);border-radius:10px;padding:10px 14px;}
  .feature-item span{font-size:18px;}
</style>
</head>
<body>
<div class="header">
  <div class="title">kass<span>za</span> 🗂️ Projektek</div>
  <a class="back-btn" href="index.html">← Vissza</a>
</div>
<div class="body">
  <div class="coming-card">
    <div class="coming-icon">🚧</div>
    <div class="coming-title">Hamarosan</div>
    <div class="coming-msg">A Projektek funkció fejlesztés alatt van. Hamarosan itt tudod majd kezelni a közös kiadásokat, utazásokat és egyéb projekteket.</div>
    <div class="feature-list">
      <div class="feature-item"><span>✈️</span> Utazások közös költségei</div>
      <div class="feature-item"><span>🔗</span> Megosztható link partnernek</div>
      <div class="feature-item"><span>💰</span> Ki mennyit fizetett</div>
      <div class="feature-item"><span>📊</span> Projekt összefoglaló</div>
      <div class="feature-item"><span>✅</span> Elszámolás egy gombbal</div>
    </div>
  </div>
</div>
</body>
</html>
